services:
  postgres:
    image: postgres:18-alpine
    container_name: habeas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: habeas
      POSTGRES_PASSWORD: habeas
      POSTGRES_DB: habeas
    ports:
      - "5432:5432"
    volumes:
      - habeas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habeas -d habeas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  habeas-pgdata:
